name: Deploy Dashboard

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # --- Go data fetcher ---
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Build data fetcher
        working-directory: backend
        run: go build -o ../fetcher ./cmd/fetcher/

      # Restore AI analysis cache so only new/changed failures are re-analyzed
      - name: Restore AI cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/data/ai_cache.json
          key: ai-cache-${{ github.run_id }}
          restore-keys: ai-cache-

      - name: Fetch test data
        env:
          AI_TOKEN: ${{ secrets.AI_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./fetcher -builds=8 -workers=5 -out=frontend/public/data -timeout=10m -ai

      # Save AI cache for future cron runs
      - name: Save AI cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: frontend/public/data/ai_cache.json
          key: ai-cache-${{ github.run_id }}

      # --- React frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # --- Deploy to GitHub Pages ---
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
