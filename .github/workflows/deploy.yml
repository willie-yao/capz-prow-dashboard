name: Publish redirect page

# Publishes a static index.html that redirects visitors to the new
# capz-prow-ai-dashboard site. The data fetcher + dashboard build that
# used to run here have moved to:
# https://github.com/willie-yao/capz-prow-ai-dashboard
on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  publish-redirect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generate redirect page
        run: |
          mkdir -p site
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>CAPZ Prow Dashboard has moved</title>
              <meta http-equiv="refresh" content="0; url=https://willie-yao.github.io/capz-prow-ai-dashboard/" />
              <link rel="canonical" href="https://willie-yao.github.io/capz-prow-ai-dashboard/" />
              <style>
                body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; }
                a { color: #2563eb; }
              </style>
            </head>
            <body>
              <h1>This dashboard has moved</h1>
              <p>The CAPZ Prow Dashboard is now at <a href="https://willie-yao.github.io/capz-prow-ai-dashboard/">willie-yao.github.io/capz-prow-ai-dashboard</a>.</p>
              <p>Redirecting automatically&hellip; If nothing happens, follow the link above.</p>
              <script>
                window.location.replace("https://willie-yao.github.io/capz-prow-ai-dashboard/");
              </script>
            </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
